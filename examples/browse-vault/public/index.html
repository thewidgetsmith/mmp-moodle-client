<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Vault -- live course browser</title>
<link rel="stylesheet" href="/app.css" />
</head>
<body>
  <header>
    <h1>The Vault</h1>
    <p class="subtitle">
      Live proof-of-concept &mdash; browsing real Moodle course content via
      <code>mmp-moodle-client</code>
    </p>
  </header>

  <form id="search-form" class="search-form">
    <label>
      Browse by
      <select id="criterianame">
        <option value="tagid">Interest tag id</option>
        <option value="search">Title / topic text</option>
      </select>
    </label>
    <label class="value-label">
      Value
      <input id="criteriavalue" type="text" placeholder="e.g. 5, or &quot;employment&quot;" required />
    </label>
    <button type="submit">Browse</button>
  </form>

  <p id="status" class="status" role="status"></p>

  <div id="grid" class="grid"></div>

  <div class="modal" id="modal" hidden>
    <div class="modal-content">
      <button class="modal-close" id="modal-close" type="button" aria-label="Close">&times;</button>
      <h2 id="modal-title"></h2>
      <div id="modal-video-wrapper" class="video-wrapper" hidden>
        <iframe
          id="modal-video"
          title="Course video"
          allow="autoplay; fullscreen; picture-in-picture"
          allowfullscreen
        ></iframe>
      </div>
      <p id="modal-no-video" class="modal-note" hidden></p>
      <div id="modal-summary" class="summary"></div>
      <p id="modal-transcript-wrapper" hidden>
        <a id="modal-transcript" target="_blank" rel="noreferrer">View transcript</a>
      </p>
    </div>
  </div>

  <script src="/app.js" defer></script>
</body>
</html>
